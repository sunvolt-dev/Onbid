# ─────────────────────────────────────────────
# Onbid 내부 nginx — onbid_nginx 컨테이너에서 사용
# 호스트 nginx(443/80)에서 127.0.0.1:3001로 프록시되어 들어옴
# ─────────────────────────────────────────────
server {
    listen       80;
    server_name  _;

    client_max_body_size 10m;

    # Flask API — Next 의 rewrites 없이도 직접 접근 가능하도록 우선 매칭
    location /api/ {
        proxy_pass         http://onbid_api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next.js — 정적/동적 모두. WebSocket 대비 헤더 포함
    location / {
        proxy_pass         http://onbid_web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
