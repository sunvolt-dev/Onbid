# ─────────────────────────────────────────────
# Onbid 내부 nginx — onbid_nginx 컨테이너에서 사용
# 호스트 nginx(443/80)에서 127.0.0.1:3001로 프록시되어 들어옴
# ─────────────────────────────────────────────
server {
    listen       80;
    server_name  _;

    client_max_body_size 10m;

    # Basic Auth — 도메인/HTTPS 설정 전까지 공개 노출 방지
    # htpasswd 파일은 서버에서 별도로 생성 (.gitignore 대상)
    auth_basic           "Onbid Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # gzip — /api/items 같은 대용량 JSON 응답 압축 (~1MB → ~200KB)
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_min_length    1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # Flask API — Next 의 rewrites 없이도 직접 접근 가능하도록 우선 매칭
    location /api/ {
        proxy_pass         http://onbid_api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Next.js — 정적/동적 모두. WebSocket 대비 헤더 포함
    location / {
        proxy_pass         http://onbid_web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
